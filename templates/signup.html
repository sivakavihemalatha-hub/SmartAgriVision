{% extends "base.html" %}
{% block content %}

<div class="card form-box">

<h2 style="margin-bottom:20px;">Signup</h2>

<form method="POST" onsubmit="return validateSignup()">

<input type="text" name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<input type="password" name="confirm" placeholder="Confirm Password" required>

<button class="btn-primary">Signup</button>

</form>

<p style="margin-top:15px;">
Already have an account?
<a href="/login" style="color:#ef4444;">Login</a>
</p>

</div>

<!-- ================= VALIDATION ONLY ================= -->
<script>
function validateSignup() {
    let pass = document.querySelector("input[name='password']").value;
    let confirm = document.querySelector("input[name='confirm']").value;

    if (pass !== confirm) {
        alert("❌ Passwords do not match!");
        return false;
    }
    return true;
}
</script>

{% endblock %}
