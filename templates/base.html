<!DOCTYPE html>
<html>
<head>
<title>Apple AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  min-height: 100%;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #065f46);
}

body {
  min-height: 100%;
  margin: 0;
  background: transparent;
  color: white;
}
/* NAVBAR */
.navbar {
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar h2 {
  color: #dc2626;
}

.navbar a {
  margin-left: 18px;
  text-decoration: none;
  color: white;        /* ✅ white text */
  font-weight: 700;    /* ✅ bold */
}

.navbar a:hover {
  color: #22c55e;   /* green on hover */
}

/* GLOBAL TEXT FIX */
p, h1, h2, h3 {
  color: #f8fafc;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: 40px auto;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 20px;
}

/* FORM BOX */
.form-box {
  max-width: 420px;
  margin: 100px auto;
  text-align: center;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

/* ✅ GREEN BUTTON */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(34,197,94,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(34,197,94,0.6);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}
</style>
</head>

<body>

<!-- ✅ NAVBAR ONLY AFTER LOGIN -->
{% if 'user_id' in session and request.endpoint not in ['login', 'signup'] %}

<div class="navbar">
  <h2>🍎 Apple AI</h2>

  <div>
    <a href="/dashboard">Dashboard</a>

    {% if session['role'] == 'admin' %}
      <a href="/history">History</a>
      <a href="/admin">All Users History</a>
    {% else %}
      <a href="/history">History</a>
    {% endif %}

    <a href="/profile">Profile</a>
    <a href="/logout">Logout</a>
  </div>
</div>

{% endif %}

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
