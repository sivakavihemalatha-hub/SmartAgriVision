{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<!-- ERROR -->
{% if error %}
<div class="card" style="background:#7f1d1d;">
    <p>{{ error }}</p>
</div>
{% endif %}

<!-- UPLOAD -->
<div class="card" style="max-width:500px; margin-bottom:20px;">
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit" class="btn-primary">Upload & Predict</button>
    </form>
</div>

<!-- RESULT -->
{% if prediction %}
<div class="card" style="text-align:center;">

    <h2>Prediction Result</h2>

    <img src="{{ image }}" width="220">

    <h3>{{ prediction }}</h3>
    <h4>{{ confidence }}</h4>

    <p>{{ prevention }}</p>

</div>
{% endif %}

{% endblock %}
