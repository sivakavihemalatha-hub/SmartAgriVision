{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<!-- ================= UPLOAD FORM ================= -->
<div class="card" style="max-width:500px; margin-bottom:20px;">
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit" class="btn-primary">Upload & Predict</button>
    </form>
</div>

<!-- ================= RESULT SECTION ================= -->
{% if session.get('image') %}

<div class="card" style="text-align:center;">

    <h2>Prediction Result</h2>

    <img src="{{ session.get('image') }}" width="220" style="border-radius:10px;">

    <h3>Prediction: {{ session.get('prediction') }}</h3>

    <h4>Confidence: {{ session.get('confidence') }}</h4>

    <h4 style="margin-top:15px;">Prevention:</h4>
    <p>{{ session.get('prevention') }}</p>

</div>

{% endif %}

{% endblock %}
